name: 開発タスク
description: Sub Issueとして実装作業を管理するためのテンプレート
title: "[Task]: "
body:
  - type: markdown
    attributes:
      value: |
        このフォームは、機能要望などを具体的な作業へ分割し、Sub Issueとして管理するためのものです。
        親Issueの「Create sub-issue」から作成し、親子関係が設定されていることを確認してください。

  - type: textarea
    id: tasks
    attributes:
      label: 作業内容
      description: 実施する内容を記載してください。必要に応じてチェックリストを使用してください。
      placeholder: |
        - [ ] APIの入力スキーマを変更する
        - [ ] サービス層を変更する
        - [ ] テストを追加する
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 完了条件
      description: このタスクを完了と判断できる、検証可能な条件を記載してください。
      placeholder: |
        - [ ] 指定した公開日で記事を絞り込める
        - [ ] 関連するテストが通る
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 技術的な制約、参考資料、検討事項などがあれば記載してください。
    validations:
      required: false
